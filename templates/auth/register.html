{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8 mt-10">
    <h1 class="text-2xl font-bold mb-6 text-center">Create Account</h1>
    {% if error %}<p class="text-red-500 text-sm mb-4">{{ error }}</p>{% endif %}
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-3">
            <input name="first_name" placeholder="First name" required
                pattern="[A-Za-z\s\-']+"
                title="First name must contain letters only (no numbers or special characters)"
                oninput="this.value = this.value.replace(/[^A-Za-z\s\-']/g, '')"
                class="border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input name="last_name" placeholder="Last name" required
                pattern="[A-Za-z\s\-']+"
                title="Last name must contain letters only (no numbers or special characters)"
                oninput="this.value = this.value.replace(/[^A-Za-z\s\-']/g, '')"
                class="border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <select name="role" class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>
        <input name="user_code" placeholder="Student ID / Employee ID (e.g. STU001)"
            class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <input name="username" placeholder="Username" required
            class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <input name="password" type="password" placeholder="Password" required
            class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium">
            Create Account
        </button>
    </form>
    <p class="text-center text-sm mt-4 text-gray-500">
        Have an account? <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Sign in</a>
    </p>
</div>
{% endblock %}

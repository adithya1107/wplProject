{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8 mt-10">
    <h1 class="text-2xl font-bold mb-6 text-center">Sign In</h1>
    {% if error %}<p class="text-red-500 text-sm mb-4">{{ error }}</p>{% endif %}
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <input name="username" placeholder="Username" required
            class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <input name="password" type="password" placeholder="Password" required
            class="w-full border rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-medium">
            Sign In
        </button>
    </form>
    <p class="text-center text-sm mt-4 text-gray-500">
        No account? <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Register</a>
    </p>
</div>
{% endblock %}

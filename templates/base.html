<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <a href="/" class="font-bold text-blue-600 text-lg">QR Attendance</a>
        {% if user.is_authenticated %}
        <div class="flex items-center gap-4">
            <span class="text-sm text-gray-600">{{ user.get_full_name }} ({{ user.role }})</span>
            <a href="{% url 'logout' %}" class="text-sm text-red-500 hover:underline">Sign out</a>
        </div>
        {% endif %}
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
